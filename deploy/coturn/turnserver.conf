# Standalone coturn TEMPLATE — use when you need TURN/TURNS on its own IP (e.g. TURNS on 443)
# separate from LiveKit's embedded TURN. Critical for the "Gather.town in a locked-down office"
# case where only outbound 443/TCP is allowed.
listening-port=3478
tls-listening-port=5349
# For the strictest networks, run TURNS on 443 on a DEDICATED IP (not shared with the app).
# alt-tls-listening-port=443

# Public IP of this TURN host (REQUIRED). Set to the node's reachable address.
external-ip=CHANGE_ME_PUBLIC_IP

# Relay UDP port range (open on the firewall).
min-port=49152
max-port=65535

# Auth: use a shared secret (REST/ephemeral credentials). CHANGE THIS.
use-auth-secret
static-auth-secret=CHANGE_ME_turn_shared_secret
realm=turn.CHANGE_ME.example.com

# TLS certs for TURNS (mount enterprise/Let's Encrypt certs).
# cert=/certs/fullchain.pem
# pkey=/certs/privkey.pem

fingerprint
no-cli
