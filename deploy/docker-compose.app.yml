# Proximity application services (built from Dockerfiles). Compose with the base + a profile:
#   full self-hosted stack:
#     docker compose -f docker-compose.yml -f docker-compose.app.yml --profile storage up
# Local dev usually runs these natively instead (see docker-compose.local.yml).
services:
  world-server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    image: proximity-server:${TAG:-latest}
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      PUBLIC_WEB_ORIGIN: ${PUBLIC_WEB_ORIGIN:-*}
      PG_HOST: ${PG_HOST:-postgres}
      PG_PORT: ${PG_PORT:-5432}
      PG_DB: ${PG_DB:-proximity}
      PG_USER: ${PG_USER:-proximity}
      PG_PASSWORD: ${PG_PASSWORD:-proximity_dev}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # Public URL the BROWSER uses for LiveKit signaling (must be directly reachable).
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://localhost:7880}
      # Internal URL the server uses for the LiveKit HTTP/Egress API.
      LIVEKIT_HTTP_URL: ${LIVEKIT_HTTP_URL:-http://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret_devsecret_change_me_1234567890}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-proximity-recordings}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      EGRESS_S3_ENDPOINT: ${EGRESS_S3_ENDPOINT:-http://minio:9000}
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    image: proximity-worker:${TAG:-latest}
    environment:
      PG_HOST: ${PG_HOST:-postgres}
      PG_PORT: ${PG_PORT:-5432}
      PG_DB: ${PG_DB:-proximity}
      PG_USER: ${PG_USER:-proximity}
      PG_PASSWORD: ${PG_PASSWORD:-proximity_dev}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-proximity-recordings}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      # Point these at mounted model files to enable transcription/summary.
      WHISPER_MODEL: ${WHISPER_MODEL:-}
      LLM_MODEL: ${LLM_MODEL:-}
    volumes:
      - ${MODELS_DIR:-./models}:/models:ro
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    image: proximity-web:${TAG:-latest}
    restart: unless-stopped

  # Egress recorder template (static). Point EGRESS_TEMPLATE_URL=http://recorder at it so
  # recordings bake in annotations. VITE_WORLD_WS must be the world-server WS reachable from
  # the egress container's browser (e.g. ws://host.docker.internal:8080/ws locally).
  recorder:
    build:
      context: ..
      dockerfile: apps/recorder/Dockerfile
      args:
        VITE_WORLD_WS: ${VITE_WORLD_WS:-ws://host.docker.internal:8080/ws}
    image: proximity-recorder:${TAG:-latest}
    restart: unless-stopped

  caddy:
    image: caddy:2
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - world-server
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
