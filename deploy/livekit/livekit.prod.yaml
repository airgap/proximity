# LiveKit config TEMPLATE for production (AWS / DO / on-prem). Edit the marked values.
# The critical prod differences vs local: use_external_ip + a reachable public IP, and TURN/TURNS
# for restrictive corporate firewalls. MEDIA MUST reach this node directly (never via Cloudflare).
port: 7880
bind_addresses:
  - "0.0.0.0"

rtc:
  udp_port: 7882 # single UDP mux (open this on the firewall/security group)
  tcp_port: 7881 # ICE/TCP fallback
  use_external_ip: true # discover the node's public IP for ICE candidates
  # If auto-detection is wrong (e.g. behind 1:1 NAT), pin it:
  # node_ip: "203.0.113.10"

# CHANGE THIS SECRET. The server mints tokens with the same key/secret.
keys:
  devkey: CHANGE_ME_generate_a_long_random_secret

# Redis: self-hosted -> redis:6379; managed (ElastiCache/DO) -> set the managed endpoint.
redis:
  address: redis:6379

# Embedded TURN. TURNS on 443 is what lets locked-down office networks connect; it needs its own
# hostname/IP (443 can't be shared with the app's Caddy on the same IP) — see DEPLOY.md.
turn:
  enabled: true
  domain: turn.CHANGE_ME.example.com
  tls_port: 5349 # move to 443 on a dedicated IP for the strictest firewalls
  # external_tls: true  # if TLS is terminated upstream

room:
  empty_timeout: 300
  max_participants: 300

logging:
  level: info
