name: Build images

on:
  push:
    branches: [main]
    tags: ["v*"]

# Builds multi-arch app images and pushes to GHCR. The Parabun base lives in DO's registry;
# provide DIGITALOCEAN_ACCESS_TOKEN to pull it. Skips gracefully if the secret is absent.
jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DigitalOcean registry (for the Parabun base image)
        if: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Build & push app images
        if: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN != '' }}
        run: |
          set -e
          REG=ghcr.io/${{ github.repository }}
          SHA=${GITHUB_SHA::12}
          for app in server web worker; do
            docker buildx build --platform linux/amd64,linux/arm64 \
              -f apps/$app/Dockerfile \
              -t $REG-$app:$SHA -t $REG-$app:latest \
              --push .
          done

  # Redeploy the app containers on the spatial.lyku.co droplet after a main-branch
  # build. Gated on DOPPLER_TOKEN: forks / un-configured repos skip it cleanly.
  # SSH key + droplet host/user/path live in Doppler; nothing sensitive is in the
  # repo. See deploy/ci-deploy.sh + deploy/DEPLOY.md ("CI redeploy").
  deploy:
    needs: images
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Doppler CLI
        if: ${{ secrets.DOPPLER_TOKEN != '' }}
        uses: dopplerhq/cli-action@v3
      - name: Redeploy droplet
        if: ${{ secrets.DOPPLER_TOKEN != '' }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          SHA: ${{ github.sha }}
        run: doppler run --preserve-env -- bash deploy/ci-deploy.sh
