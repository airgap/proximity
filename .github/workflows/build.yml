name: Build images

on:
  push:
    branches: [main]
    tags: ["v*"]

# Builds multi-arch app images and pushes to GHCR. The Parabun base is public
# (ghcr.io/airgap/parabun), so the build needs no registry credentials beyond the
# built-in GITHUB_TOKEN for pushing to GHCR.
jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app images
        run: |
          set -e
          REG=ghcr.io/${{ github.repository }}
          SHA=${GITHUB_SHA::12}
          for app in server web worker; do
            docker buildx build --platform linux/amd64,linux/arm64 \
              -f apps/$app/Dockerfile \
              -t $REG-$app:$SHA -t $REG-$app:latest \
              --push .
          done

  # Redeploy the app containers on the spatial.lyku.co droplet after a main-branch
  # build. Gated on DOPPLER_TOKEN: forks / un-configured repos skip it cleanly.
  # Droplet host/user + SSH key live in Doppler (project ci / config prd) as
  # API_IP / API_USER / API_SSH_KEY; nothing sensitive is in the repo. The
  # droplet pulls the app images CI pushes here (public GHCR). See
  # deploy/ci-deploy.sh + deploy/DEPLOY.md ("CI redeploy").
  deploy:
    needs: images
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Doppler CLI
        if: ${{ secrets.DOPPLER_TOKEN != '' }}
        uses: dopplerhq/cli-action@v3
      - name: Redeploy droplet (pull :latest, restart web + world-server)
        if: ${{ secrets.DOPPLER_TOKEN != '' }}
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- bash deploy/ci-deploy.sh
