<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Proximity Recorder</title>
    <style>
      html, body { margin: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
      #stage { position: fixed; inset: 0; }
      #screen { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; background: #000; }
      #annot { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="stage">
      <video id="screen" autoplay playsinline muted></video>
      <canvas id="annot"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
